name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install virtual display and Qt dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y \
                  xvfb \
                  libEGL1 \
                  libxkbcommon-x11-0 \
                  libdbus-1-3 \
                  libxcb-icccm4 \
                  libxcb-image0 \
                  libxcb-keysyms1 \
                  libxcb-randr0 \
                  libxcb-render-util0 \
                  libxcb-xinerama0 \
                  libxcb-xfixes0

            - name: Install Python dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            
            - name: Lint with Ruff
              run: |
                ruff check .
            
            - name: Type check with MyPy
              run: |
                mypy .
            
            - name: Run tests with pytest
              run: |
                pytest tests/ -v

